<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Ambiental Kids</title>

<script>
let tiempo = 30;
let puntos = 0;
let juegoActivo = true;

const objetos = [
    { nombre: "Botella", tipo: "plastico" },
    { nombre: "Periódico", tipo: "papel" },
    { nombre: "Cáscara de plátano", tipo: "organico" }
];

let actual;

function nuevoObjeto() {
    if (!juegoActivo) return;

    actual = objetos[Math.floor(Math.random() * objetos.length)];
    document.getElementById("objeto").innerText = actual.nombre;
}

function verificar(tipo) {
    if (!juegoActivo) return;

    if (tipo === actual.tipo) {
        puntos++;
    } else {
        puntos--;
    }

    document.getElementById("puntos").innerText = "Puntos: " + puntos;
    nuevoObjeto();
}

// ⏱️ TEMPORIZADOR
const temporizador = setInterval(() => {
    tiempo--;
    document.getElementById("tiempo").innerText = "Tiempo: " + tiempo;

    if (tiempo <= 0) {
        clearInterval(temporizador);
        juegoActivo = false;

        document.getElementById("fin").innerText =
            "⏰ Fin del juego. Puntaje: " + puntos;

        document.getElementById("reiniciar").style.display = "inline-block";
    }
}, 1000);

function reiniciarJuego() {
    location.reload();
}

nuevoObjeto();
</script>

</body>
</html>
