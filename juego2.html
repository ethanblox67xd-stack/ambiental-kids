<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Ambiental Kids</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #e8f5e9;
}

h1 {
    color: #2e7d32;
}

#area {
    width: 300px;
    height: 300px;
    margin: auto;
    background: white;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.objeto {
    position: absolute;
    font-size: 30px;
    cursor: pointer;
}

#puntos {
    font-size: 20px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>♻️ Atrapa la basura correcta</h1>
<p>Haz clic SOLO en lo reciclable</p>

<p id="puntos">Puntos: 0</p>

<div id="area"></div>

<a href="index.html">⬅️ Volver</a>

<script>
let puntos = 0;
l1e1t tiempo = 30;       
let juegoActivo = true;

const objetos = [
    { emoji: "🧴", tipo: "reciclable" },
    { emoji: "📄", tipo: "reciclable" },
    { emoji: "🍌", tipo: "basura" },
    { emoji: "🍎", tipo: "basura" }
];

function crearObjeto() {
    if (!juegoActivo) return;

function crearObjeto() {
    const area = document.getElementById("area");
    const obj = objetos[Math.floor(Math.random() * objetos.length)];

    const div = document.createElement("div");
    div.className = "objeto";
    div.innerText = obj.emoji;

    div.style.left = Math.random() * 250 + "px";
    div.style.top = Math.random() * 250 + "px";

    div.onclick = function() {
        if (!juegoActivo) return;
        
        if (obj.tipo === "reciclable") {
            puntos++;
        } else {
            puntos--;
        }
        document.getElementById("puntos").innerText = "Puntos: " + puntos;
        div.remove();
    };

    area.appendChild(div);

    setTimeout(() => {
        if (area.contains(div)) div.remove();
    }, 1500);
}

    const temporizador = setInterval(() => {
    tiempo--;
    document.getElementById("tiempo").innerText = "Tiempo: " + tiempo;

    if (tiempo <= 0) {
        clearInterval(temporizador);
        juegoActivo = false;
        alert("⏰ Fin del juego. Puntos: " + puntos);
    }
}, 1000);

setInterval(crearObjeto, 1000);
</script>

</body>
</html>
