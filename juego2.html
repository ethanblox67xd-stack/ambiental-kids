<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Ambiental Kids</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #e8f5e9;
}

h1 {
    color: #2e7d32;
}

#area {
    width: 300px;
    height: 300px;
    margin: auto;
    background: white;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.objeto {
    position: absolute;
    font-size: 30px;
    cursor: pointer;
}

#puntos {
    font-size: 20px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>♻️ Atrapa la basura correcta</h1>
<p>Haz clic SOLO en lo reciclable</p>

<p id="tiempo">Tiempo: 60</p>
<p id="puntos">Puntos: 0</p>
<div id="area"></div>

<a href="index.html">⬅️ Volver</a>

    <br><br>
<button id="reiniciar" onclick="reiniciarJuego()" style="display:none;">
🔄 Volver a jugar
</button>

<script>
let puntos = 0;
let tiempo = 60;
let juegoActivo = true;

const objetos = [
    // ♻️ RECICLABLES
    { emoji: "🧴", tipo: "reciclable" }, // botella plástico
    { emoji: "🥤", tipo: "reciclable" }, // vaso plástico
    { emoji: "📄", tipo: "reciclable" }, // papel
    { emoji: "📰", tipo: "reciclable" }, // periódico
    { emoji: "📦", tipo: "reciclable" }, // caja
    { emoji: "🥫", tipo: "reciclable" }, // lata
    { emoji: "🧃", tipo: "reciclable" }, // jugo caja
    { emoji: "📚", tipo: "reciclable" }, // libros
    { emoji: "🧻", tipo: "reciclable" }, // papel higiénico (cartón)
    { emoji: "📬", tipo: "reciclable" }, // correo/cartón

    // 🗑️ BASURA
    { emoji: "🍌", tipo: "basura" },
    { emoji: "🍎", tipo: "basura" },
    { emoji: "🍕", tipo: "basura" },
    { emoji: "🍔", tipo: "basura" },
    { emoji: "🍗", tipo: "basura" },
    { emoji: "🥚", tipo: "basura" },
    { emoji: "🍟", tipo: "basura" },
    { emoji: "🍞", tipo: "basura" },
    { emoji: "🌮", tipo: "basura" },
    { emoji: "🍩", tipo: "basura" }
];

const area = document.getElementById("area");
const puntosTexto = document.getElementById("puntos");
const tiempoTexto = document.getElementById("tiempo");

// 🎮 GENERADOR
const generador = setInterval(() => {
    if (!juegoActivo) return;

    const obj = objetos[Math.floor(Math.random() * objetos.length)];

    const div = document.createElement("div");
    div.className = "objeto";
    div.innerText = obj.emoji;

    div.style.left = Math.random() * 260 + "px";
    div.style.top = Math.random() * 260 + "px";

    div.onclick = function() {
        if (!juegoActivo) return;

        if (obj.tipo === "reciclable") {
            puntos++;
        } else {
            puntos--;
        }

        puntosTexto.innerText = "Puntos: " + puntos;
        div.remove();
    };

    area.appendChild(div);

    setTimeout(() => {
        if (area.contains(div)) div.remove();
    }, 1500);

}, 800);

// ⏱️ TEMPORIZADOR
const temporizador = setInterval(() => {
    tiempo--;
    tiempoTexto.innerText = "Tiempo: " + tiempo;

    if (tiempo <= 0) {
        juegoActivo = false;
        clearInterval(temporizador);
        clearInterval(generador);

        alert("⏰ Fin del juego. Puntos: " + puntos);
        
        document.getElementById("reiniciar").style.display = "inline-block";
    }
    function reiniciarJuego() {
    location.reload();
}
}, 1000);
</script>

</body>
</html>
