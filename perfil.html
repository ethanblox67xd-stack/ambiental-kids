<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Perfil - Ambiental Kids</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#e8f5e9;
    text-align:center;
}

header{
    background:linear-gradient(90deg,#4CAF50,#00BCD4);
    color:white;
    padding:20px;
}

.perfil{
    background:white;
    width:420px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.avatar{
    font-size:80px;
}

h2{
    color:#2e7d32;
}

.info{
    font-size:22px;
    margin:15px 0;
}

.barra{
    width:100%;
    height:30px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progreso{
    height:100%;
    width:0%;
    background:#4CAF50;
}

button{
    margin-top:25px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

</style>

</head>

<body>

<header>

<h1>👤 Mi Perfil</h1>

</header>

<div class="perfil">

<div class="avatar">🌎</div>

<h2 id="nombre"></h2>

<div class="info">
⭐ Puntos:
<span id="puntos"></span>
</div>

<div class="info">
🏆 Título:
<span id="titulo"></span>
</div>

<div class="info">
🎮 Juegos completados:
<span id="juegos"></span>
</div>

<div class="info">
📈 Nivel:
<span id="nivel"></span>
</div>

<div class="barra">

<div class="progreso" id="barra"></div>

</div>

<br>

<a href="index.html">
<button>⬅️ Volver al inicio</button>
</a>

</div>

<script src="jugador.js"></script>

<script>

document.getElementById("nombre").innerText = jugador.nombre;

document.getElementById("puntos").innerText = jugador.puntos;

document.getElementById("titulo").innerText = jugador.titulo;

document.getElementById("juegos").innerText =
jugador.juegosCompletados;

document.getElementById("nivel").innerText =
jugador.nivel;

document.getElementById("barra").style.width =
(jugador.puntos % 100) + "%";

</script>

</body>
</html>
