<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Matemático</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    background:#e8f5e9;
}

h1{
    color:#2e7d32;
}

.caja{
    background:white;
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

#resultado{
    font-size:25px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>➕ escribe la respuesta correcta</h1>

<div class="caja">

<h2 id="pregunta"></h2>

<input type="number" id="respuesta" placeholder="Escribe tu respuesta">

<br><br>

<button onclick="respuesta()">
Responder
</button>

<p id="resultado"></p>

<br>

<a href="index.html">
<button>⬅️ Volver</button>
</a>

</div>

<script>

const preguntas = [

{
pregunta: "♻️ Si un recolector recoge 50 botellas y cada una pesa 20 g, ¿cuántos gramos lleva?",
respuesta: 1000
},

{
pregunta: "💧 Si una llave desperdicia 5 litros por hora durante 4 horas, ¿cuántos litros se desperdician?",
respuesta: 20
},

{
pregunta: "🌳 Si cada árbol ayuda a 2 personas y hay 15 árboles, ¿a cuántas personas ayuda?",
respuesta: 30
},

{
pregunta: "♻️ Si reciclas 8 botellas al día durante 7 días, ¿cuántas reciclas?",
respuesta: 56
}

];

let preguntaActual;

function nuevaPregunta() {

    preguntaActual =
    preguntas[Math.floor(Math.random() * preguntas.length)];

    document.getElementById("pregunta").innerText =
    preguntaActual.pregunta;

    document.getElementById("resultado").innerText = "";
}

function respuesta() {

    let valor =
    parseInt(document.getElementById("respuesta").value);

    if(valor === preguntaActual.respuesta){

        document.getElementById("resultado").innerText =
        "🎉 ¡Correcto!";

        setTimeout(nuevaPregunta, 1000);

    } else {

        document.getElementById("resultado").innerText =
        "❌ Intenta otra vez";
    }
}

nuevaPregunta();

</script>
</body>
</html>
