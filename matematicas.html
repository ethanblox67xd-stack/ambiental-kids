<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Matemático</title>

    
<style>
body{
    text-align:center;
    font-family:Arial;
    background:#e8f5e9;
}

h1{
    color:#2e7d32;
}

.caja{
    background:white;
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

#resultado{
    font-size:25px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>➕ Escribe la respuesta correcta</h1>

<div class="caja">

document.getElementById("puntos").innerText =
"⭐ Puntos: " + jugador.puntos;

document.getElementById("titulo").innerText =
"🏆 Título: " + jugador.titulo;
    
<h2 id="pregunta"></h2>

<input type="number" id="respuesta" placeholder="Escribe tu respuesta">

<br><br>

<button onclick="respuesta()">
Responder
</button>

<p id="resultado"></p>

<br>

<a href="index.html">
<button>⬅️ Volver</button>
</a>

<button onclick="reiniciarProgreso()">
🗑️ Reiniciar progreso
</button>
    
</div>

<script src="jugador.js"></script>
    
<script>
    
const preguntas = [

{
pregunta: "♻️ Si un recolector recoge 50 botellas y cada una pesa 20 g, ¿cuántos gramos lleva?",
respuesta: 1000
},

{
pregunta: "💧 Si una llave desperdicia 5 litros por hora durante 4 horas, ¿cuántos litros se desperdician?",
respuesta: 20
},

{
pregunta: "🌳 Si cada árbol ayuda a 2 personas y hay 15 árboles, ¿a cuántas personas ayuda?",
respuesta: 30
},

{
pregunta: "♻️ Si reciclas 8 botellas al día durante 7 días, ¿cuántas reciclas?",
respuesta: 56
},

{
pregunta: "♻️ Una escuela recicla 35 botellas cada día. ¿Cuántas reciclará en 12 días?",
respuesta: 420
},

{
pregunta: "🌳 En un parque hay 48 árboles. Si plantan 27 más, ¿cuántos habrá en total?",
respuesta: 75
},

{
pregunta: "💧 Una familia ahorra 15 litros de agua al día. ¿Cuántos litros ahorrará en 30 días?",
respuesta: 450
},

{
pregunta: "🗑️ Un camión recoge 125 kg de basura por la mañana y 175 kg por la tarde. ¿Cuántos kg recoge en total?",
respuesta: 300
},

{
pregunta: "♻️ Si una botella tarda 450 años en degradarse, ¿cuántos años tardarían 2 botellas?",
respuesta: 900
},

{
pregunta: "🌱 Un vivero tiene 240 plantas y vende 85. ¿Cuántas plantas le quedan?",
respuesta: 155
},

{
pregunta: "🚲 Un niño recorre 18 km en bicicleta cada sábado. ¿Cuántos kilómetros recorrerá en 8 sábados?",
respuesta: 144
},

{
pregunta: "💡 Una bombilla LED consume 8 watts. Si hay 12 bombillas iguales, ¿cuántos watts consumen en total?",
respuesta: 96
},

{
pregunta: "🌳 Cada árbol absorbe 22 kg de CO₂ al año. ¿Cuánto absorben 15 árboles?",
respuesta: 330
},

{
pregunta: "♻️ Una planta de reciclaje procesa 350 envases por hora. ¿Cuántos procesa en 6 horas?",
respuesta: 2100
},

{
pregunta: "💧 Un tanque contiene 1200 litros de agua. Si se usan 375 litros, ¿cuántos quedan?",
respuesta: 825
},

{
pregunta: "🗑️ En una campaña ambiental participaron 48 niños. Cada uno recogió 12 papeles. ¿Cuántos papeles recogieron en total?",
respuesta: 576
},

{
pregunta: "🌳 Si se plantan 18 árboles por semana durante 24 semanas, ¿cuántos árboles se plantan en total?",
respuesta: 432
},

{
pregunta: "♻️ Una ciudad recicla 1250 kg de papel al mes. ¿Cuánto reciclará en un año?",
respuesta: 15000
},

{
pregunta: "💧 Una fuga desperdicia 8 litros por minuto. ¿Cuántos litros desperdicia en una hora?",
respuesta: 480
},

{
pregunta: "🌎 Un bosque tiene 325 árboles. Si se pierden 18 y luego se plantan 47 nuevos, ¿cuántos árboles hay ahora?",
respuesta: 354
}

];

let preguntaActual;

function nuevaPregunta() {

    preguntaActual =
    preguntas[Math.floor(Math.random() * preguntas.length)];

    document.getElementById("pregunta").innerText =
    preguntaActual.pregunta;

    document.getElementById("resultado").innerText = "";
}

function respuesta() {

    let valor =
    parseInt(document.getElementById("respuesta").value);

if(valor === preguntaActual.respuesta){

    sumarPuntos(10);
    
document.getElementById("puntos").innerText =
"⭐ Puntos: " + jugador.puntos;

    actualizarTitulo();

    document.getElementById("resultado").innerText =
    "🎉 ¡Correcto!";

    document.getElementById("respuesta").value = "";

    setTimeout(nuevaPregunta, 1000);

} else {

document.getElementById("resultado").innerText =
"❌ Intenta otra vez";

document.getElementById("respuesta").value = "";
    }
}

document.getElementById("puntos").innerText =
"⭐ Puntos: " + puntos;

actualizarTitulo();
    
nuevaPregunta();

function reiniciarProgreso(){

    if(confirm("¿Seguro que deseas borrar todo tu progreso?")){

localStorage.removeItem("jugador");

        puntos = 0;
        titulo = "🌱 Amigo de la Naturaleza";

        document.getElementById("puntos").innerText =
        "⭐ Puntos: 0";

        document.getElementById("titulo").innerText =
        "🏆 Título: 🌱 Amigo de la Naturaleza";
    }
}
    
</script>
</body>
</html>
